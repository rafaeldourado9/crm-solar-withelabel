name: Manual Rollback

on:
  workflow_dispatch:
    inputs:
      backup_timestamp:
        description: 'Backup timestamp (YYYYMMDD_HHMMSS) or leave empty for last backup'
        required: false
        type: string

jobs:
  rollback:
    runs-on: ubuntu-latest
    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts
      
      - name: Execute Rollback
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} << 'EOF'
            cd /opt/crm-solar
            
            echo "🔄 Starting rollback process..."
            
            # Stop current services
            docker-compose down
            
            # Restore images
            if [ -f .backup/last_images.txt ]; then
              echo "📦 Restoring previous Docker images..."
              while IFS= read -r image; do
                echo "Pulling: $image"
                docker pull "$image" 2>/dev/null || true
              done < .backup/last_images.txt
            fi
            
            # Restore database
            if [ -n "${{ inputs.backup_timestamp }}" ]; then
              BACKUP_FILE=".backup/db_prod_${{ inputs.backup_timestamp }}.sql"
            else
              BACKUP_FILE=$(ls -t .backup/db_*.sql 2>/dev/null | head -n 1)
            fi
            
            if [ -f "$BACKUP_FILE" ]; then
              echo "💾 Restoring database from: $(basename $BACKUP_FILE)"
              docker-compose up -d db
              sleep 10
              docker-compose exec -T db psql -U postgres crm_solar < "$BACKUP_FILE"
            else
              echo "⚠️  No database backup found, skipping DB restore"
            fi
            
            # Start services
            echo "🚀 Starting services..."
            docker-compose up -d
            
            # Wait and verify
            sleep 60
            
            echo "🔍 Verifying services..."
            docker-compose ps
            
            # Health check
            for i in {1..30}; do
              if curl -f http://localhost:8000/health/ 2>/dev/null; then
                echo "✅ Rollback successful!"
                exit 0
              fi
              echo "Waiting for services... ($i/30)"
              sleep 2
            done
            
            echo "❌ Rollback verification failed"
            docker-compose logs --tail=50
            exit 1
          EOF
      
      - name: Notify Result
        if: always()
        run: |
          if [ $? -eq 0 ]; then
            echo "✅ Rollback completed successfully"
          else
            echo "❌ Rollback failed"
          fi
