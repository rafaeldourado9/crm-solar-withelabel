name: CI Tests

on:
  pull_request:
    branches: [development, dev, prod, production, main, v1]
  push:
    branches: [development, dev, prod, production, main, v1]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: crm_solar_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
      
      - name: Run migrations
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: crm_solar_test
          DB_USER: postgres
          DB_PASSWORD: postgres
        run: |
          cd backend
          python manage.py migrate || echo "Migration failed"
      
      - name: Run tests
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: crm_solar_test
          DB_USER: postgres
          DB_PASSWORD: postgres
        run: |
          cd backend
          python manage.py test || echo "No tests found"
      
      - name: Security scan
        run: |
          cd backend
          pip install bandit safety
          bandit -r apps/ -f json -o bandit-report.json || true
          safety check --json > safety-report.json || true
      
      - name: OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'CRM Solar'
          path: '.'
          format: 'HTML'
      
      - name: Upload OWASP Report
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: owasp-report
          path: reports
      
      - name: Upload security report
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: security-report
          path: |
            backend/bandit-report.json
            backend/safety-report.json

  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install dependencies
        run: |
          cd frontend
          npm ci
      
      - name: Build
        run: |
          cd frontend
          npm run build
      
      - name: Lint
        run: |
          cd frontend
          npm run lint || true

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build Backend
        run: |
          cd backend
          docker build -t crm-solar-backend:test .
      
      - name: Build Frontend
        run: |
          cd frontend
          docker build -t crm-solar-frontend:test .
