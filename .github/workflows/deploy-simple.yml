name: Deploy Simple

on:
  push:
    branches: [dev, main, prod]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts
      
      - name: Create backup
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
            cd /opt/crm-solar
            mkdir -p .backup
            docker-compose exec -T db pg_dump -U postgres crm_solar > .backup/db_$(date +%Y%m%d_%H%M%S).sql || true
            ls -t .backup/db_*.sql | tail -n +6 | xargs -r rm
          EOF
      
      - name: Deploy
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
            cd /opt/crm-solar
            
            # Pull latest code
            git fetch origin
            git reset --hard origin/${GITHUB_REF##*/}
            
            # Rebuild and restart
            docker-compose down
            docker-compose up -d --build
            
            # Wait for services
            echo "Waiting for services to start..."
            sleep 60
            
            # Run migrations
            docker-compose exec -T backend python manage.py migrate --no-input
            
            # Collect static
            docker-compose exec -T backend python manage.py collectstatic --no-input
          EOF
      
      - name: Health Check
        run: |
          echo "Checking application health..."
          for i in {1..30}; do
            if curl -f http://${{ secrets.SERVER_HOST }}:8000/health/ 2>/dev/null; then
              echo "✅ Application is healthy!"
              exit 0
            fi
            echo "Attempt $i/30..."
            sleep 2
          done
          echo "❌ Health check failed"
          exit 1
      
      - name: Rollback on failure
        if: failure()
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
            cd /opt/crm-solar
            echo "Deploy failed, rolling back..."
            
            # Restore database
            LAST_BACKUP=$(ls -t .backup/db_*.sql 2>/dev/null | head -n 1)
            if [ -f "$LAST_BACKUP" ]; then
              docker-compose exec -T db psql -U postgres crm_solar < "$LAST_BACKUP"
            fi
            
            # Restart services
            docker-compose restart
          EOF
      
      - name: Show status
        if: always()
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
            cd /opt/crm-solar
            echo "=== Container Status ==="
            docker-compose ps
            echo ""
            echo "=== Recent Logs ==="
            docker-compose logs --tail=20
          EOF
