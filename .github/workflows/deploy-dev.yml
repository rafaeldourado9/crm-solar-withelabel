name: Deploy DEV

on:
  push:
    branches: [development, dev]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
      
      - name: Run tests
        run: |
          cd backend
          python manage.py test || echo "No tests found"

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts
      
      - name: Create Backup
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
            cd /opt/crm-solar
            mkdir -p .backup
            docker-compose exec -T db pg_dump -U postgres crm_solar > .backup/db_$(date +%Y%m%d_%H%M%S).sql 2>/dev/null || true
            docker-compose ps -q | xargs docker inspect --format='{{.Config.Image}}' > .backup/last_images.txt 2>/dev/null || true
            ls -t .backup/db_*.sql 2>/dev/null | tail -n +6 | xargs -r rm
          EOF
      
      - name: Deploy to DEV
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
            cd /opt/crm-solar
            
            # Update code
            git fetch origin
            git reset --hard origin/${GITHUB_REF##*/}
            
            # Update .env backend
            cat > .env << ENVEOF
SECRET_KEY=${{ secrets.DJANGO_SECRET_KEY }}
DEBUG=False
ALLOWED_HOSTS=${{ secrets.SERVER_IP }},localhost

DB_NAME=crm_solar
DB_USER=postgres
DB_PASSWORD=${{ secrets.DB_PASSWORD }}
DB_HOST=db
DB_PORT=5432

REDIS_HOST=redis
REDIS_PORT=6379

CORS_ORIGINS=http://${{ secrets.SERVER_IP }}
ENVEOF
            
            # Update .env frontend
            echo "VITE_API_URL=http://${{ secrets.SERVER_IP }}:8000" > frontend/.env
            
            # Deploy
            docker-compose down
            docker-compose up -d --build
            
            # Wait for services
            echo "Waiting for services..."
            sleep 90
            
            # Run migrations
            docker-compose exec -T backend python manage.py migrate --no-input
          EOF
      
      - name: Health Check
        run: |
          echo "Checking application health..."
          for i in {1..30}; do
            if curl -f http://${{ secrets.SERVER_IP }}:8000/health/ 2>/dev/null; then
              echo "✅ Application is healthy!"
              exit 0
            fi
            echo "Attempt $i/30..."
            sleep 2
          done
          echo "❌ Health check failed"
          exit 1
      
      - name: Rollback on Failure
        if: failure()
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
            cd /opt/crm-solar
            echo "❌ Deploy failed, rolling back..."
            
            # Restore previous images
            if [ -f .backup/last_images.txt ]; then
              while IFS= read -r image; do
                echo "Pulling previous image: $image"
                docker pull "$image" 2>/dev/null || true
              done < .backup/last_images.txt
            fi
            
            # Restart services
            docker-compose down
            docker-compose up -d
            
            # Restore database
            LAST_BACKUP=$(ls -t .backup/db_*.sql 2>/dev/null | head -n 1)
            if [ -f "$LAST_BACKUP" ]; then
              echo "Restoring database from $LAST_BACKUP"
              docker-compose exec -T db psql -U postgres crm_solar < "$LAST_BACKUP" 2>/dev/null || true
            fi
            
            sleep 30
            docker-compose exec -T backend python manage.py migrate
            
            echo "✅ Rollback completed"
          EOF
      
      - name: Show Status
        if: always()
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
            cd /opt/crm-solar
            echo "=== Container Status ==="
            docker-compose ps
          EOF
