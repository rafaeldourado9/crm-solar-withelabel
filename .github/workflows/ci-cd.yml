name: CI/CD Pipeline

on:
  push:
    branches: [dev, prod]
  pull_request:
    branches: [dev, prod]

jobs:
  test:
    name: Tests & Security
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
          
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          
      - name: Run security checks
        run: |
          cd backend
          python manage.py check --deploy
          
      - name: Run tests
        env:
          DB_HOST: localhost
          DB_NAME: test_db
          DB_USER: postgres
          DB_PASSWORD: postgres
          REDIS_HOST: localhost
          SECRET_KEY: test-secret-key
        run: |
          cd backend
          python test_security.py
          
      - name: Check migrations
        env:
          DB_HOST: localhost
          DB_NAME: test_db
          DB_USER: postgres
          DB_PASSWORD: postgres
        run: |
          cd backend
          python manage.py makemigrations --check --dry-run
          
  build:
    name: Build Docker Images
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
        
      - name: Build backend
        run: |
          cd backend
          docker build -t crm-solar-backend:${{ github.sha }} .
          
      - name: Build frontend
        run: |
          cd frontend
          docker build -f Dockerfile.prod -t crm-solar-frontend:${{ github.sha }} .
          
      - name: Test containers
        run: |
          docker run --rm crm-solar-backend:${{ github.sha }} python manage.py check
          
  deploy-dev:
    name: Deploy to DEV
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/dev'
    
    steps:
      - name: Deploy notification
        run: |
          echo "🚀 Deploying to DEV environment"
          echo "Branch: ${{ github.ref }}"
          echo "Commit: ${{ github.sha }}"
