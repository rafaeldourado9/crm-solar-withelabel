name: OWASP Security Scan

on:
  schedule:
    - cron: '0 2 * * 1'  # Every Monday at 2 AM
  workflow_dispatch:
  push:
    branches: [prod, production, main]

jobs:
  owasp-dependency-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'CRM Solar'
          path: '.'
          format: 'ALL'
          args: >
            --enableRetired
            --enableExperimental
      
      - name: Upload OWASP Report
        uses: actions/upload-artifact@v3
        with:
          name: owasp-dependency-check
          path: reports

  owasp-zap-scan:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.10.0
        with:
          target: 'http://${{ secrets.SERVER_IP }}'
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a'
      
      - name: Upload ZAP Report
        uses: actions/upload-artifact@v3
        with:
          name: zap-scan-report
          path: report_html.html

  python-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
      
      - name: Bandit Security Scan
        run: |
          cd backend
          pip install bandit
          bandit -r apps/ -ll -f json -o bandit-report.json || true
          bandit -r apps/ -ll -f html -o bandit-report.html || true
      
      - name: Safety Vulnerability Check
        run: |
          cd backend
          pip install safety
          safety check --json > safety-report.json || true
          safety check > safety-report.txt || true
      
      - name: Pip Audit
        run: |
          cd backend
          pip install pip-audit
          pip-audit --format json > pip-audit.json || true
      
      - name: Upload Python Security Reports
        uses: actions/upload-artifact@v3
        with:
          name: python-security-reports
          path: |
            backend/bandit-report.json
            backend/bandit-report.html
            backend/safety-report.json
            backend/safety-report.txt
            backend/pip-audit.json

  npm-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: NPM Audit
        run: |
          cd frontend
          npm audit --json > npm-audit.json || true
          npm audit > npm-audit.txt || true
      
      - name: Upload NPM Security Reports
        uses: actions/upload-artifact@v3
        with:
          name: npm-security-reports
          path: |
            frontend/npm-audit.json
            frontend/npm-audit.txt

  docker-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Run Trivy vulnerability scanner - Backend
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: './backend'
          format: 'sarif'
          output: 'trivy-backend.sarif'
      
      - name: Run Trivy vulnerability scanner - Frontend
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: './frontend'
          format: 'sarif'
          output: 'trivy-frontend.sarif'
      
      - name: Upload Trivy Reports
        uses: actions/upload-artifact@v3
        with:
          name: trivy-reports
          path: |
            trivy-backend.sarif
            trivy-frontend.sarif

  summary:
    needs: [owasp-dependency-check, python-security, npm-security, docker-security]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Security Scan Summary
        run: |
          echo "# 🔒 OWASP Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Scans Completed:" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ OWASP Dependency Check" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Python Security (Bandit + Safety)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ NPM Security Audit" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Docker Security (Trivy)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📊 Download artifacts for detailed reports" >> $GITHUB_STEP_SUMMARY
