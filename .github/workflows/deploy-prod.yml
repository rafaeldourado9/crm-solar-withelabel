name: Deploy PROD

on:
  push:
    branches: [prod, production, main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
      
      - name: Run tests
        run: |
          cd backend
          python manage.py test || echo "No tests found"
      
      - name: Security scan
        run: |
          cd backend
          pip install bandit safety
          bandit -r apps/ -f json -o bandit-report.json || true
          safety check --json || true
      
      - name: Upload security report
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: security-report
          path: backend/bandit-report.json

  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: production
      url: http://${{ secrets.SERVER_IP }}
    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts
      
      - name: Create Full Backup
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} << 'EOF'
            cd /opt/crm-solar
            mkdir -p .backup
            
            # Backup database
            echo "Creating database backup..."
            docker-compose exec -T db pg_dump -U postgres crm_solar > .backup/db_prod_$(date +%Y%m%d_%H%M%S).sql 2>/dev/null || true
            
            # Save current images
            docker-compose ps -q | xargs docker inspect --format='{{.Config.Image}}' > .backup/last_images.txt 2>/dev/null || true
            
            # Save deployment timestamp
            echo "$(date +%Y%m%d_%H%M%S)" > .backup/last_deploy.txt
            
            # Keep only last 10 backups
            ls -t .backup/db_prod_*.sql 2>/dev/null | tail -n +11 | xargs -r rm
            
            echo "✅ Backup completed"
          EOF
      
      - name: Deploy to PROD
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} << 'EOF'
            cd /opt/crm-solar
            
            # Update code
            git fetch origin
            git reset --hard origin/${GITHUB_REF##*/}
            
            # Update .env backend
            cat > .env << ENVEOF
SECRET_KEY=${{ secrets.DJANGO_SECRET_KEY }}
DEBUG=False
ALLOWED_HOSTS=${{ secrets.SERVER_IP }},localhost

DB_NAME=crm_solar
DB_USER=postgres
DB_PASSWORD=${{ secrets.DB_PASSWORD }}
DB_HOST=db
DB_PORT=5432

REDIS_HOST=redis
REDIS_PORT=6379

CORS_ORIGINS=http://${{ secrets.SERVER_IP }}
ENVEOF
            
            # Update .env frontend
            echo "VITE_API_URL=http://${{ secrets.SERVER_IP }}:8000" > frontend/.env
            
            # Deploy with zero downtime
            docker-compose down
            docker-compose up -d --build
            
            # Wait for services
            echo "Waiting for services to start..."
            sleep 120
            
            # Run migrations
            docker-compose exec -T backend python manage.py migrate --no-input
            
            # Collect static files
            docker-compose exec -T backend python manage.py collectstatic --no-input
          EOF
      
      - name: Health Check
        run: |
          echo "Running health checks..."
          for i in {1..30}; do
            if curl -f http://${{ secrets.SERVER_IP }}:8000/health/ 2>/dev/null; then
              echo "✅ Backend is healthy!"
              break
            fi
            echo "Waiting for backend... ($i/30)"
            sleep 2
          done
          
          # Final health check
          if ! curl -f http://${{ secrets.SERVER_IP }}:8000/health/ 2>/dev/null; then
            echo "❌ Health check failed"
            exit 1
          fi
      
      - name: Smoke Tests
        run: |
          echo "Running smoke tests..."
          
          # Test backend
          curl -f http://${{ secrets.SERVER_IP }}:8000/health/ || exit 1
          
          # Test frontend
          curl -f http://${{ secrets.SERVER_IP }}/ || exit 1
          
          echo "✅ Smoke tests passed"
      
      - name: Rollback on Failure
        if: failure()
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} << 'EOF'
            cd /opt/crm-solar
            
            echo "❌ Deployment failed, initiating rollback..."
            
            # Stop current containers
            docker-compose down
            
            # Restore previous images
            if [ -f .backup/last_images.txt ]; then
              echo "Restoring previous Docker images..."
              while IFS= read -r image; do
                echo "Pulling: $image"
                docker pull "$image" 2>/dev/null || true
              done < .backup/last_images.txt
            fi
            
            # Restore database
            LAST_BACKUP=$(ls -t .backup/db_prod_*.sql 2>/dev/null | head -n 1)
            if [ -f "$LAST_BACKUP" ]; then
              echo "Restoring database from: $LAST_BACKUP"
              docker-compose up -d db
              sleep 10
              docker-compose exec -T db psql -U postgres crm_solar < "$LAST_BACKUP" 2>/dev/null || true
            fi
            
            # Start services with old version
            docker-compose up -d
            sleep 60
            
            # Run migrations to ensure consistency
            docker-compose exec -T backend python manage.py migrate
            
            # Verify rollback
            if curl -f http://localhost:8000/health/ 2>/dev/null; then
              echo "✅ Rollback completed successfully"
            else
              echo "❌ Rollback verification failed"
              docker-compose logs --tail=50
            fi
          EOF
      
      - name: Cleanup Old Images
        if: success()
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} << 'EOF'
            docker image prune -af --filter "until=72h"
          EOF
      
      - name: Notify Success
        if: success()
        run: |
          echo "✅ Deploy PROD successful!"
          echo "Deployed at: $(date)"
          echo "URL: http://${{ secrets.SERVER_IP }}"
      
      - name: Notify Failure
        if: failure()
        run: |
          echo "❌ Deploy PROD failed and rolled back!"
          echo "Failed at: $(date)"
