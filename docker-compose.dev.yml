version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sunops-backend-dev
    restart: unless-stopped
    env_file:
      - .env.dev
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    expose:
      - "8000"
    networks:
      - sunops-network
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2 --timeout 120

  frontend:
    image: node:18-alpine
    container_name: sunops-frontend-dev
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host"
    expose:
      - "5173"
    networks:
      - sunops-network

  nginx:
    image: nginx:alpine
    container_name: sunops-nginx-dev
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/var/www/static:ro
      - media_volume:/var/www/media:ro
    depends_on:
      - backend
      - frontend
    networks:
      - sunops-network

volumes:
  static_volume:
  media_volume:

networks:
  sunops-network:
    driver: bridge
