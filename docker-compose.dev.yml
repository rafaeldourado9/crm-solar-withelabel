version: '3.8'

services:
  backend:
    image: ghcr.io/${GITHUB_REPOSITORY}/backend:dev
    container_name: sunops-backend-dev
    restart: always
    env_file:
      - .env.dev
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    networks:
      - sunops-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY}/frontend:dev
    container_name: sunops-frontend-dev
    restart: always
    networks:
      - sunops-network

  nginx:
    image: nginx:alpine
    container_name: sunops-nginx-dev
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - static_volume:/var/www/static:ro
      - media_volume:/var/www/media:ro
    depends_on:
      - backend
      - frontend
    networks:
      - sunops-network

volumes:
  static_volume:
  media_volume:

networks:
  sunops-network:
    driver: bridge
