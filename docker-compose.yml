services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: crm_solar
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - crm_network

  backend:
    build: ./backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
      - media_data:/app/media
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      - DB_HOST=db
      - DB_NAME=crm_solar
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DEBUG=True
    networks:
      - crm_network

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - crm_network

volumes:
  postgres_data:
  media_data:

networks:
  crm_network:
    driver: bridge
