version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: sunops_postgres
    environment:
      POSTGRES_USER: sunops
      POSTGRES_PASSWORD: sunops123
      POSTGRES_DB: sunops
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sunops"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sunops_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sunops_api
    command: sh -c "alembic upgrade head && uvicorn src.main:app --host 0.0.0.0 --port 8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://sunops:sunops123@postgres:5432/sunops
      - DATABASE_URL_SYNC=postgresql://sunops:sunops123@postgres:5432/sunops
      - REDIS_URL=redis://redis:6379/0
      - DEBUG=true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sunops_nginx
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  postgres_data:
